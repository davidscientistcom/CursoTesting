<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOI - Docker desde cero</title>
    <style>
        :root {
            --bg: #061325;
            --surface: #0c1a31;
            --border: rgba(255, 255, 255, 0.12);
            --text: #eef4fb;
            --accent: #ef3d31;
            --accent-dark: #be2c23;
            --shadow: 0 28px 60px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(239, 61, 49, 0.12), transparent 25%),
                linear-gradient(180deg, #08162a 0%, var(--bg) 100%);
            font-family: Inter, system-ui, sans-serif;
            color: var(--text);
        }

        .cover-shell {
            width: min(1420px, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .cover-frame {
            width: 100%;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .cover-frame img {
            display: block;
            width: 100%;
            height: auto;
        }

        .start-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 220px;
            padding: 16px 28px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #ff6a3d);
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            box-shadow: 0 16px 30px rgba(239, 61, 49, 0.28);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .start-button:hover,
        .start-button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 22px 36px rgba(239, 61, 49, 0.34);
            background: linear-gradient(135deg, #ff5647, #ff7a43);
        }

        @media (max-width: 700px) {
            body {
                padding: 14px;
            }

            .cover-shell {
                gap: 14px;
            }

            .start-button {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <main class="cover-shell">
        <div class="cover-frame">
            <img src="portada.png" alt="Portada del curso EOI de Docker desde cero">
        </div>
        <a class="start-button" href="indice-curso.html">Empezar!</a>
    </main>
</body>
</html>
